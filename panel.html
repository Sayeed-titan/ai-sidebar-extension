<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Sidebar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <!-- icon sprite -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <symbol id="i-square" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/></symbol>
    <symbol id="i-rows" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/></symbol>
    <symbol id="i-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4.5A1.5 1.5 0 0 1 3.5 3H8a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 4.5A1.5 1.5 0 0 0 20.5 3H16a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></symbol>
    <symbol id="i-maximize" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></symbol>
    <symbol id="i-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/></symbol>
    <symbol id="i-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14 21 3M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></symbol>
    <symbol id="i-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></symbol>
    <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5M14 10a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5"/></symbol>
    <symbol id="i-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></symbol>
  </defs></svg>

  <header id="topbar">
    <div id="tabs"></div>
    <div id="mode-toggle">
      <button class="mode-btn" data-mode="single" title="Single view"><svg><use href="#i-square"/></svg></button>
      <button class="mode-btn" data-mode="split" title="Split view"><svg><use href="#i-rows"/></svg></button>
      <button class="mode-btn" data-mode="notebook" title="Notebook"><svg><use href="#i-book"/></svg></button>
    </div>
  </header>

  <main id="frames"></main>

  <section id="notebook" class="hidden">
    <div class="nb-toolbar">
      <button id="nb-session-btn" class="nb-session">
        <span class="lbl">Session</span>
        <span class="name" id="nb-session-name">Default</span>
        <svg><use href="#i-chevron-down"/></svg>
      </button>
      <select id="nb-session" aria-label="Switch session" style="display:none"></select>
      <button id="nb-new-session" class="nb-iconbtn" title="New session"><svg><use href="#i-plus"/></svg></button>
      <button id="nb-export" class="nb-iconbtn" title="Export Markdown"><svg><use href="#i-download"/></svg></button>
    </div>
    <div class="nb-toolbar2">
      <div class="nb-search">
        <svg><use href="#i-search"/></svg>
        <input id="nb-search" type="search" placeholder="Search saved answers…" />
      </div>
    </div>
    <div id="nb-list"></div>
    <div id="nb-empty">No saved answers yet. Hit <strong>Save to notebook</strong> on any AI message.</div>
    <div id="nb-action-bar" class="hidden">
      <span class="count" id="nb-selected-count">0 selected</span>
      <span class="lbl">Synthesize with</span>
      <div class="ai-select-wrap">
        <select id="nb-synth-ai" class="ai-select"></select>
        <svg><use href="#i-chevron-down"/></svg>
      </div>
      <div class="right">
        <button id="nb-synth-go" class="btn-on-dark">Compare</button>
        <button id="nb-clear-sel" class="btn-on-dark-ghost" title="Clear"><svg><use href="#i-x"/></svg></button>
      </div>
    </div>
  </section>

  <div id="empty">Select text on any page and click an AI to get started.</div>

  <script src="lib/ais.js"></script>
  <script src="panel.js"></script>
</body>
</html>
